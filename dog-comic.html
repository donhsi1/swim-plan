<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>旺财 vs 小白 - 搞笑四格漫画</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #fff8e7;
    font-family: 'Microsoft YaHei', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 20px;
  }
  h1 {
    font-size: 28px;
    color: #5a3e1b;
    margin-bottom: 6px;
    letter-spacing: 2px;
  }
  .subtitle {
    font-size: 14px;
    color: #a0826d;
    margin-bottom: 30px;
  }
  .comic-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
    max-width: 860px;
    width: 100%;
  }
  .panel {
    background: white;
    border: 3px solid #3a2a1a;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 4px 4px 0px #3a2a1a;
    position: relative;
  }
  .panel-num {
    position: absolute;
    top: 8px;
    left: 10px;
    font-size: 13px;
    font-weight: bold;
    color: #3a2a1a;
    background: #ffe082;
    border: 2px solid #3a2a1a;
    border-radius: 50%;
    width: 24px; height: 24px;
    display: flex; align-items: center; justify-content: center;
    z-index: 10;
  }
  svg { display: block; width: 100%; }
  .footer {
    margin-top: 28px;
    font-size: 13px;
    color: #a0826d;
  }
</style>
</head>
<body>
